<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Your Birthday Letter</title>
    <meta
      name="description"
      content="A birthday envelope opening page that leads into the scrapbook story."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="opening-body">
    <main class="opening-page">
      <a class="envelope-link" href="./scrapbook.html" aria-label="Open the birthday letter">
        <span class="opening-eyebrow">a little birthday letter</span>

        <div class="envelope-scene">
          <div class="envelope-letter">
            <p class="handwritten">for you</p>
            <h1>Happy Birthday</h1>
          </div>
          <div class="envelope-back"></div>
          <div class="envelope-flap"></div>
          <div class="envelope-front"></div>
          <div class="envelope-seal">05 08</div>
        </div>

        <span class="opening-cta">Open Letter</span>
      </a>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
